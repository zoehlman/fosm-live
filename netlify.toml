# ─────────────────────────────────────────────────────────────────
# FOSM·LIVE · Netlify configuration
# ─────────────────────────────────────────────────────────────────
# One Netlify site serves the whole ecosystem:
#   /                          → landing page (root index.html)
#   /system-map/               → master architectural wireframe
#   /marketing-cc/             → Marketing Command Center
#   /sales-cc/                 → Sales Command Center
#   /fosm-live-cc/             → FOSM·LIVE deployable command center (business)
#   /fosm-live-personal/       → FOSM·LIVE Personal (personal-finance variant)
#   /vision-cc/                → Vision-to-Reality Command Center
#   /api/ai-proxy              → Anthropic streaming proxy (Marketing + FOSM·LIVE CCs)
#   /api/image-gen             → Replicate image generation (Marketing CC)
#   /api/image-status          → Replicate poll endpoint (Marketing CC)
#   /api/anthropic-proxy-personal → Anthropic proxy for FOSM·LIVE Personal
#                                  (separate env var: ANTHROPIC_API_KEY_PERSONAL)
#   /auth/callback             → FOSM·LIVE Brain · Google OAuth callback (Phase 2C)
#
# Why one site (not many): the cross-CC handoff between Marketing CC and
# Sales CC reads localStorage, which is same-origin only. Splitting CCs
# across subdomains breaks the bridge.
# ─────────────────────────────────────────────────────────────────

[build]
  publish = "."
  command = "echo 'No build step — static HTML deploy.'"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Pretty URLs ──────────────────────────────────────────────────
# Force trailing slashes so relative asset paths inside each CC resolve.

[[redirects]]
  from = "/marketing-cc"
  to = "/marketing-cc/"
  status = 301

[[redirects]]
  from = "/sales-cc"
  to = "/sales-cc/"
  status = 301

[[redirects]]
  from = "/fosm-live-cc"
  to = "/fosm-live-cc/"
  status = 301

[[redirects]]
  from = "/fosm-live-personal"
  to = "/fosm-live-personal/"
  status = 301

[[redirects]]
  from = "/vision-cc"
  to = "/vision-cc/"
  status = 301

[[redirects]]
  from = "/system-map"
  to = "/system-map/"
  status = 301

# ── Brain auth callback (Phase 2C) ───────────────────────────────
# Google's OAuth client is registered with redirect URI
#   https://fosmlive.netlify.app/auth/callback
# Netlify Functions live at /.netlify/functions/<name> by default,
# so we rewrite /auth/callback → the function. status=200 is a rewrite
# (URL stays as /auth/callback in the browser), not a 301 redirect.
# Spec ref: docs/brain-spec.md v1.1 §11 Phase 2C.

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

# ── API headers (all functions) ──────────────────────────────────

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "content-type"

# ── Static asset caching ─────────────────────────────────────────

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─────────────────────────────────────────────────────────────────
# FOSM·LIVE Personal · strict security headers
# ─────────────────────────────────────────────────────────────────
# These headers are scoped to /fosm-live-personal/* only, NOT applied
# globally. Reasons:
#   - The personal app handles real OAuth tokens for Google Sheets and
#     deserves the strictest hardening (CSP locks scripts to inline +
#     Google's auth/sheets endpoints; HSTS forces HTTPS for a year;
#     X-Frame-Options + frame-ancestors prevent clickjacking).
#   - The other CCs use Google Fonts (fonts.googleapis.com / fonts.gstatic.com)
#     which would be blocked by this CSP. Scoping the strict headers to
#     /fosm-live-personal/* keeps the other CCs working unchanged.
#
# CSP allowlist explained:
#   script-src    'self' + Google Identity Services (gsi/client) + Google APIs JS lib
#   connect-src   'self' + Sheets API + general googleapis + OAuth2 + accounts.google.com + docs.google.com (CSV publish)
#   frame-src     accounts.google.com (sign-in popup) + content.googleapis.com (Drive Picker · v1.2)
#   frame-ancestors 'none'  ← cannot be embedded in any iframe
#   object-src    'none'    ← no plugins
# ─────────────────────────────────────────────────────────────────

[[headers]]
  for = "/fosm-live-personal/*"
  [headers.values]
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; connect-src 'self' https://sheets.googleapis.com https://www.googleapis.com https://oauth2.googleapis.com https://accounts.google.com https://docs.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://accounts.google.com https://content.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
